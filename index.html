<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Pogodynka</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="favicon.png" type="image/x-icon">
</head>
<body>

<div class="container">
    <header class="header">
        <div class="logo">
            <img src="favicon.png" alt="LOGO">
            <h4>Pogodynka</h4>
        </div> 

        <div class="wyszukiwarka">
            <input type="text" id="poleMiasta" value="Łódź" placeholder="Wpisz nazwę miasta">
            <button id="przyciskSzukaj">Szukaj</button>
            <button id="przyciskLokalizacja">Moja Lokalizacja</button>
        </div>

        <div class="przyciskiZmiany">
            <button id="przyciskJednostek">°C / °F</button>
            <button id="przyciskMotywu">Motyw</button>
        </div>
    </header>
    <hr>

    <main class="main">
        <div id="komunikat" class="komunikat"></div>

        <section class="aktualna-pogoda">
            <h2 id="nazwaMiasta">Nazwa miasta</h2>

            <span style="display: flex; justify-content: center;">
                <div class="ladny-kafelek">
                    <div class="pogoda-glowna">
                        <div class="ikona-temp">
                            <img id="ikonaPogody" src="" alt="">
                            <div class="temperatura" id="temperatura">0°C</div>
                        </div>

                        <div id="opisPogody">Opis pogody</div>
                        <div>Wilgotność: <span id="wilgotnosc">0</span>%</div>
                        <div>Wiatr: <span id="predkoscWiatru">0</span></div>
                    </div>
                </div>
            </span>
        </section>

        <hr>

        <section class="prognoza-dzis">
            <h3>Prognoza na dziś</h3>
            <div id="kontenerPrognozyDzis" class="kontener-prognozy">
            </div>
        </section>

        <hr>

        <section class="prognoza">
            <h3>Prognoza na kilka dni</h3>
            <div id="kontenerPrognozy" class="kontener-prognozy">
            </div>
        </section>
    </main>
    
    <hr>

    <footer class="footer">
        <p>Dane pogodowe: OpenWeather</p>
        <p>Created by ignas33</p>
    </footer>
</div>

<script src="main.js"></script>
</body>
</html>
